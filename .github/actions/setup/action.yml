name: Setup toolchain
description: pnpm + node + install, shared by CI and release.

inputs:
  registry-url:
    description: npm registry URL (set for publishing jobs)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v4
      with:
        node-version-file: .node-version
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - run: pnpm install --frozen-lockfile
      shell: bash
