name: Setup toolchain
description: pnpm + node + dotnet + install, shared by CI and release.

inputs:
  registry-url:
    description: npm registry URL (set for publishing jobs)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - run: pnpm install --frozen-lockfile
      shell: bash
