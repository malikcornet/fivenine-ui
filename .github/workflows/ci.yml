name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Build the library
        run: pnpm --filter @fivenine-collective/ui build

      # Catch packaging regressions before consumers do: publint for exports/
      # files/sideEffects mistakes, attw for type-resolution across resolvers.
      - name: Verify packaging (publint + arethetypeswrong)
        run: pnpm lint:packages

      - name: Check bundle-size budgets
        run: pnpm size

      # Same script the deploy runs, but only the working-tree build — PR
      # checkouts are shallow (no tags), and CI shouldn't rebuild old versions.
      - name: Build the docs site (latest only)
        run: node scripts/build-site.mjs --latest-only --base "/${{ github.event.repository.name }}"
