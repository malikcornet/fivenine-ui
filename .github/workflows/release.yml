name: Release

# Changesets-driven releases:
#   1. PRs include a changeset file (`pnpm changeset`).
#   2. On push to main, changesets/action opens/updates a "Version Packages" PR
#      that bumps the version and changelog.
#   3. Merging that PR publishes @fivenine-collective/ui to npm, tags the
#      release, and re-runs the docs deploy so the new version appears on the
#      site (docs.yml builds versions from tags — see that workflow).
#
# npm auth is trusted publishing (OIDC) — no NPM_TOKEN secret. ONE-TIME bootstrap
# per package, because trusted publishing can't create a package that doesn't exist:
#   1. Publish the first version manually: `npm publish --access public` in
#      library/ (run the package build first).
#   2. npmjs.com → package → Settings → Trusted Publisher → GitHub Actions,
#      repo malikcornet/fivenine-ui, workflow release.yml.
# After that this workflow publishes tokenless (id-token: write + npm >= 11.5.1).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # npm provenance attestation (publishConfig.provenance)
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v4

      # No registry-url here: setup-node would write an .npmrc expecting
      # NODE_AUTH_TOKEN, which breaks tokenless OIDC publishing.
      - uses: ./.github/actions/setup

      # Trusted publishing needs npm >= 11.5.1; the runner's bundled npm may be older.
      - run: npm install -g npm@latest

      - name: Create version PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The push event that merged the Version Packages PR already ran the docs
  # deploy, but before the release tag existed — deploy again so the freshly
  # tagged version shows up in the switcher.
  deploy-docs:
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write
