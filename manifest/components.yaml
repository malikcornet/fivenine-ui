# Single source of truth for the component catalog.
# Consumed by the docs site (titles/descriptions) and by CI (scripts/validate.mjs),
# which verifies that every target claiming support ships an example file for every variant.
#
# Per-target status: stable | beta | planned
#   - stable/beta: an example file MUST exist at the conventional path for every variant.
#   - planned: the docs show a "not yet available" placeholder; no files required.

components:
  - name: Button
    slug: button
    description: A clickable action element. Ships visual variants and a disabled state, and accepts any native button attributes.
    status: stable
    targets:
      html: stable
      react: stable
      blazor: stable
    variants:
      - slug: primary
        title: Primary
        description: The main call-to-action style. Use at most once per view.
      - slug: secondary
        title: Secondary
        description: A lower-emphasis companion to the primary button, for secondary actions.
      - slug: disabled
        title: Disabled
        description: Non-interactive state for actions that are currently unavailable.

  - name: Dropdown
    slug: dropdown
    description: A toggleable menu anchored to a trigger button. Handles outside-click and Escape dismissal, and manages aria-expanded on the trigger.
    status: beta
    targets:
      html: stable
      react: stable
      blazor: beta
    variants:
      - slug: basic
        title: Basic
        description: The default dropdown, with the menu aligned to the leading edge of the trigger.
        minHeight: 260
      - slug: end-aligned
        title: End aligned
        description: The menu aligned to the trailing edge of the trigger, for use near the end of a toolbar or page edge.
        minHeight: 260
